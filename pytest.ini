[pytest]
# Pytest configuration for Git Audit Tool

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes

# Test markers
markers =
    unit: Unit tests with mocking (fast)
    integration: Integration tests requiring real git (may be slow)
    skipif: Skip tests conditionally

# Minimum version
minversion = 7.0

# Test paths
testpaths = tests

# Coverage options (if using pytest-cov)
# Uncomment to enable coverage reporting
# addopts = --cov=src --cov-report=html --cov-report=term

# Ignore warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
